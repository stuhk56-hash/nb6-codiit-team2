name: Test

on:
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: codiit_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d codiit_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/codiit_test
      NODE_ENV: test
      CORS_ORIGIN: http://localhost:3000
      JWT_ACCESS_SECRET: test-access-secret
      JWT_REFRESH_SECRET: test-refresh-secret
      JWT_ACCESS_EXPIRES_IN_SEC: 3600
      JWT_REFRESH_EXPIRES_IN_SEC: 1209600
      AWS_REGION: ap-northeast-2
      AWS_ACCESS_KEY_ID: test-access-key
      AWS_SECRET_ACCESS_KEY: test-secret-key
      AWS_S3_BUCKET_NAME: test-bucket
      AWS_S3_PREFIX: codiit
      STORE_PII_ENCRYPTION_KEY: test-encryption-key

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prepare Prisma client and schema
        run: |
          npx prisma generate --schema prisma/schema.prisma
          npx prisma migrate deploy --schema prisma/schema.prisma

      - name: Run tests
        run: npx jest --runInBand --passWithNoTests
