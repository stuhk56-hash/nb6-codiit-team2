name: Deploy to EC2

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to EC2 over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script_stop: true
          script: |
            set -e

            cd ~/app
            git fetch origin
            git checkout main
            git pull --ff-only origin main

            npm ci
            npm run build
            npx prisma migrate deploy

            pm2 delete codiit-backend || true
            pm2 start dist/main.js --name codiit-backend

            cd ~/app/project-codiit-fe
            npm ci

            npm run build
            pm2 restart codiit-frontend || pm2 start "npm run start -- -p 3000" --name codiit-frontend

            pm2 save
